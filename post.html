<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Dede Kurniawan</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container" style="text-align: left; padding-top: 40px; max-width: 800px; margin: 0 auto;">
        <header style="margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
            <a href="blog.html" style="color: var(--accent); text-decoration: none; font-weight: 700;">
                <i class="fas fa-arrow-left"></i> Balik ke Blog
            </a>
        </header>

        <article id="content" class="blog-content" style="line-height: 1.8; color: var(--text-main);">
            <p>Sedang memuat tulisan...</p>
        </article>

        <footer style="margin-top: 80px; border-top: 1px solid var(--border); padding-top: 20px; text-align: center;">
            &copy; <span id="year"></span> Dede Kurniawan. All rights reserved.
        </footer>
    </div>

    <script>
        // Ambil slug dari URL (?s=nama-file)
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('s');

        // Sinkronisasi Tema (Dark/Light)
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('year').textContent = new Date().getFullYear();

        if (slug) {
            // Ambil file .md dari folder posts/
            fetch(`posts/${slug}.md`)
                .then(res => {
                    if (!res.ok) throw new Error('Postingan tidak ditemukan');
                    return res.text();
                })
                .then(text => {
                    // Render teks Markdown menjadi HTML
                    document.getElementById('content').innerHTML = marked.parse(text);
                    // Update judul halaman sesuai judul artikel (opsional)
                    const firstLine = text.split('\n')[0].replace('#', '').trim();
                    if(firstLine) document.title = `${firstLine} | Dede Blog`;
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = `
                        <div style="text-align:center; padding: 50px 0;">
                            <h2 style="color: var(--accent);">Ups! 404</h2>
                            <p>${err.message}</p>
                        </div>`;
                });
        } else {
            window.location.href = 'blog.html';
        }
    </script>
</body>
</html>
