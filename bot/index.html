<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraXID Bot | Status & Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .container {
            padding: 40px 20px;
            max-width: 480px;
            margin-top: 30px;
        }
        
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin-top: 30px;
        }

        .bot-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            border: none;
        }

        .bot-link:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .bg-fb { background-color: #1877f2; }
        .bg-x { background-color: #000000; }
        .bg-ig { background-color: #e4405f; }
        
        /* Posisi Centang Biru di Tengah Bawah */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px; /* Tambah margin agar teks h1 tidak tertabrak badge */
            width: 150px;
            height: 150px;
        }
        
        .profile-img {
            margin-bottom: 0;
        }

        .verified-badge {
            position: absolute;
            bottom: -15px; /* Keluar sedikit dari lingkaran foto */
            left: 50%;
            transform: translateX(-50%); /* Teknik centering horizontal */
            color: #1d9bf0;
            background: var(--bg-color);
            border-radius: 50%;
            font-size: 2rem;
            line-height: 1;
            padding: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Style Footer Link */
        .footer-link {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-btn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <header>
            <div class="profile-wrapper">
                <img src="/icons/icon.webp" alt="CraXID Bot" class="profile-img">
                <i class="fas fa-check-circle verified-badge"></i>
            </div>

            <h1 class="name">CraXID Bot</h1>
            <div class="role">Layanan WhatsApp Bot Aktif</div>

            <p class="bio">
                Pusat informasi resmi untuk layanan CraXID Bot. 
                Dapatkan akses ke bot dan hubungi admin melalui tautan di bawah ini.
            </p>
        </header>

        <div class="links-wrapper">
            <a href="https://wa.me/nomor_bot" class="bot-link" style="background-color: var(--wa-green);">
                <i class="fab fa-whatsapp"></i> WhatsApp (BOT)
            </a>

            <a href="https://www.facebook.com/dede2015k" class="bot-link bg-fb">
                <i class="fab fa-facebook-f"></i> Facebook (Admin)
            </a>

            <a href="https://github.com/craxid" class="bot-link bg-x">
                <i class="fab fa-x-twitter"></i> X/Twitter (Admin)
            </a>

            <a href="https://instagram.com/dede_klender" class="bot-link bg-ig">
                <i class="fab fa-instagram"></i> Instagram (Admin)
            </a>
        </div>
    </div>

    <footer>
        Copyright &copy; <span id="year"></span> | <a href="/" class="footer-link">CraXID Project</a>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
