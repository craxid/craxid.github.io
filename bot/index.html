<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraXID Bot | Status & Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css"> </head>
<body>

    <button id="theme-toggle" class="theme-btn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <header>
            <div style="position: relative; display: inline-block;">
                <img src="/icons/icon.webp" alt="CraXID Bot" class="profile-img">
                <i class="fas fa-check-circle" style="position: absolute; bottom: 35px; right: 10px; color: #1d9bf0; background: white; border-radius: 50%; font-size: 1.5rem;"></i>
            </div>

            <h1 class="name">CraXID Bot</h1>
            <div class="role">Layanan WhatsApp Bot Aktif</div>

            <p class="bio">
                Pusat informasi resmi untuk layanan CraXID Bot. 
                Dapatkan akses ke bot dan hubungi admin melalui tautan di bawah ini.
            </p>
        </header>

        <main style="display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; margin: 0 auto;">
            
            <a href="https://wa.me/nomor_bot" class="whatsapp-btn" style="margin-bottom: 10px; width: 100%; justify-content: center;">
                <i class="fab fa-whatsapp"></i> WhatsApp (BOT)
            </a>

            <a href="https://www.facebook.com/dede2015k" class="project-card" style="display: flex; align-items: center; gap: 15px; padding: 15px 25px; border-radius: 100px; background: #1877f2; color: white; border: none;">
                <i class="fab fa-facebook-f"></i> <span>Facebook (Admin)</span>
            </a>

            <a href="https://github.com/craxid" class="project-card" style="display: flex; align-items: center; gap: 15px; padding: 15px 25px; border-radius: 100px; background: #000000; color: white; border: none;">
                <i class="fab fa-x-twitter"></i> <span>X/Twitter (Admin)</span>
            </a>

            <a href="https://instagram.com/dede_klender" class="project-card" style="display: flex; align-items: center; gap: 15px; padding: 15px 25px; border-radius: 100px; background: #e4405f; color: white; border: none;">
                <i class="fab fa-instagram"></i> <span>Instagram (Admin)</span>
            </a>

        </main>
    </div>

    <footer>
        &copy; <span id="year"></span> Dede Kurniawan • CraXID
    </footer>

    <script src="../script.js"></script>
</body>
</html>
