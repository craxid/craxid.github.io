<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraXID Bot | Status & Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Perbaikan tataletak khusus halaman link bio */
        .container {
            padding: 40px 20px;
            max-width: 480px;
            margin-top: 20px;
        }

        /* Centering Foto & Memperdekat Jarak Teks */
        .profile-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px; /* Center secara horizontal & margin bawah kecil */
            width: 150px;
            height: 150px;
        }

        .profile-img {
            margin-bottom: 0 !important; /* Timpa margin dari style.css utama */
            display: block;
        }

        .name {
            margin-top: 5px; 
            font-size: 2.2rem;
        }

        .role {
            margin-bottom: 20px;
        }

        /* Wrapper Tombol */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            margin-top: 25px;
        }

        .bot-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            color: white !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            border: none;
        }

        .bot-link:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        /* Warna Tombol Kustom */
        .bg-fb { background-color: #1877f2; }
        .bg-x { background-color: #000000; }
        .bg-ig { background-color: #e4405f; }

        /* Footer Link */
        .footer-link {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-btn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <header>
            <div class="profile-wrapper">
                <img src="/icons/icon.webp" alt="CraXID Bot" class="profile-img">
            </div>

            <h1 class="name">CraXID Bot</h1>
            <div class="role">Bot WhatsApp Gratis</div>

            <p class="bio">
                Di sini kamu bisa mendapatkan informasi tentang CraXID Bot.
                
                Silahkan tekan tombol di bawah.
            </p>
        </header>

        <div class="links-wrapper">
            <a href="https://s.id/22VmC" class="bot-link" style="background-color: var(--wa-green);">
                <i class="fab fa-whatsapp"></i> WhatsApp (BOT)
            </a>

            <a href="https://www.facebook.com/dede2015k" class="bot-link bg-fb">
                <i class="fab fa-facebook-f"></i> Facebook (Admin)
            </a>

            <a href="https://github.com/craxid" class="bot-link bg-x">
                <i class="fab fa-x-twitter"></i> X/Twitter (Admin)
            </a>

            <a href="https://instagram.com/dede_klender" class="bot-link bg-ig">
                <i class="fab fa-instagram"></i> Instagram (Admin)
            </a>
        </div>
    </div>

    <footer>
        Copyright &copy; <span id="year"></span> | <a href="/" class="footer-link">CraXID Project</a>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
