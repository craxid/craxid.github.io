<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraXID Bot | Status & Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        .container {
            padding: 40px 20px;
            max-width: 450px;
            margin-top: 20px;
        }

        .profile-wrapper {
            display: flex;
            justify-content: center;
            margin: 0 auto 20px;
        }

        /* Wrapper Tombol agar searah dengan tema Glass */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin-top: 30px;
        }

        .bot-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 16px; /* Kotak rounded agar senada dengan Project Card */
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            
            /* Efek Glass yang kita ambil dari style.css */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main) !important;
        }

        .bot-link:hover {
            transform: translateY(-3px);
            background: var(--accent);
            color: white !important;
            border-color: var(--accent) !important;
        }

        /* Khusus Link WhatsApp agar tetap ada aksen hijau tapi tetap Glass */
        .link-wa {
            background: rgba(37, 211, 102, 0.1);
            border-color: rgba(37, 211, 102, 0.3) !important;
            color: #25d366 !important;
        }
        
        .link-wa:hover {
            background: #25d366 !important;
            color: white !important;
        }

        /* Ikon styling */
        .bot-link i {
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-btn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <header>
            <div class="profile-wrapper">
                <img src="/icons/icon.webp" alt="CraXID Bot" class="profile-img">
            </div>

            <h1 class="name">CraXID Bot</h1>
            <div class="role">WhatsApp Automation</div>

            <p class="bio">
                Layanan Bot WhatsApp gratis untuk berbagai kebutuhan. 
                Pilih layanan di bawah untuk mulai berinteraksi.
            </p>
        </header>

        <div class="links-wrapper">
            <a href="https://s.id/22VmC" class="bot-link link-wa">
                <i class="fab fa-whatsapp"></i> WhatsApp Bot
            </a>

            <a href="https://www.facebook.com/dede2015k" class="bot-link">
                <i class="fab fa-facebook-f"></i> Admin Facebook
            </a>

            <a href="https://instagram.com/dede_klender" class="bot-link">
                <i class="fab fa-instagram"></i> Admin Instagram
            </a>

            <a href="https://github.com/craxid" class="bot-link">
                <i class="fab fa-github"></i> GitHub Source
            </a>
        </div>
    </div>

    <footer>
        Copyright &copy; <span id="year"></span> | <a href="/" class="footer-link">CraXID Project</a>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
