<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan | Dede Kurniawan</title>
    <meta name="description" content="Ups! Halaman yang Anda cari tidak ditemukan.">
    
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh;
            justify-content: center;
            margin: 0;
        }
        .error-container {
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0;
            line-height: 1;
        }
        .error-msg {
            font-size: 1.5rem;
            color: var(--text-main);
            margin: 10px 0 30px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: white !important;
            padding: 14px 28px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease;
        }
        .back-btn:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-msg">Waduh! Halaman yang kamu cari nggak ada nih.</p>
        
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i> Balik ke Beranda
        </a>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
