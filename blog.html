<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Daftar | Dede Kurniawan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="name">My Blog</h1>
            <p class="role">Catatan & Tutorial</p>
            <a href="index.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">&larr; Ke Portfolio</a>
        </header>

        <main class="projects-grid" id="blog-list" style="margin-top: 50px;">
            </main>
    </div>

    <script>
        // Sinkronisasi Tema
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Daftar postingan (Manual isi di sini setiap nambah file .md baru)
        const posts = [
            { title: "Belajar Laravel untuk Pemula", date: "2026-04-01", slug: "tes-post" },
            { title: "Mengenal Markdown", date: "2026-04-02", slug: "mengenal-md" }
        ];

        const listContainer = document.getElementById('blog-list');
        listContainer.innerHTML = posts.map(post => `
            <a href="post.html?s=${post.slug}" class="project-card">
                <h3>${post.title}</h3>
                <p style="font-size: 0.85rem; color: var(--text-sub);">${post.date}</p>
            </a>
        `).join('');
    </script>
</body>
</html>
